{% extends 'shop/base.html' %}
{% block content %}

<div style="max-width: 400px; margin: 50px auto;">
    <div style="background: #2d2d2d; border-radius: 20px; padding: 35px; border: 1px solid #3d3d3d;">
        
        <div style="text-align: center; margin-bottom: 25px;">
            <div style="font-size: 50px;">🔐</div>
            <h1 style="font-size: 28px; margin-bottom: 8px; color: white;">Вход в аккаунт</h1>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #ddd;">Имя пользователя</label>
                <input type="text" name="username" required
                       style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #3d3d3d; background: #1e1e1e; color: white;">
            </div>
            
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px; color: #ddd;">Пароль</label>
                <input type="password" name="password" required
                       style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #3d3d3d; background: #1e1e1e; color: white;">
            </div>
            
            <button type="submit" style="width: 100%; background: #8b8b8b; color: #1a1a1a; font-weight: 700; padding: 12px; border: none; border-radius: 40px; cursor: pointer;">
                Войти
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #3d3d3d;">
            <p style="color: #aaa;">Нет аккаунта?</p>
            <a href="/register/" style="color: #adadad;">Зарегистрироваться</a>
        </div>
        
    </div>
</div>

{% endblock %}
