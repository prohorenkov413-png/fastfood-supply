{% extends 'shop/base.html' %}
{% block content %}

<h1 style="font-size: 28px; margin-bottom: 20px; color: white;">📦 Каталог товаров</h1>

<!-- Фильтр категорий -->
<div style="margin-bottom: 30px; padding: 15px; background: #2d2d2d; border-radius: 12px; border: 1px solid #3d3d3d;">
    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
        <a href="/catalog/" style="padding: 8px 16px; background: #6b6b6b; color: white; border-radius: 30px; text-decoration: none;">Все</a>
        {% for cat in categories %}
            <a href="/catalog/?category={{ cat.slug }}" style="padding: 8px 16px; background: #1e1e1e; color: #cccccc; border-radius: 30px; text-decoration: none;">{{ cat.name }}</a>
        {% endfor %}
    </div>
</div>

<div class="product-grid">
    {% for product in products %}
    <div class="product-card">
        <!-- Эмодзи вместо фото -->
        <div style="width: 100%; height: 180px; background: #1e1e1e; display: flex; align-items: center; justify-content: center; border-radius: 12px; margin-bottom: 10px;">
            <span style="font-size: 64px;">🍔</span>
        </div>
        <h3>{{ product.name }}</h3>
        <div class="price">{{ product.price }} ₽</div>
        <a href="/product/{{ product.slug }}/" class="btn">Подробнее</a>
    </div>
    {% empty %}
    <p style="color: white;">Товаров пока нет</p>
    {% endfor %}
</div>

{% endblock %}
